<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror Fashion - Loja</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Playfair+Display&family=Roboto&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="header">
        <img src="./img/logo.png" alt="Logo Mirror Fashion" class="header_logo">
        <h1 class="header_title">Mirror Fashion</h1>

        <nav class="header_nav">
            <a href="index.html">Loja</a>
            <a href="about-us.html">Sobre</a>
        </nav>
    </header>

    <!-- Banner -->
    <section class="banner">
        <h2 class="banner_title">Nova Coleção 2026</h2>
        <p class="banner_text">As melhores roupas com os melhores preços</p>
    </section>

    <!-- Produtos -->
    <main class="products">

        <h2 class="products_title">Destaques</h2>

        <section class="products_list">

            <!-- Produto 1 -->
            <article class="product_card">
                <img src="img/produto1.jpg" alt="Camiseta estilosa">
                <h3>Camiseta Estilosa</h3>
                <p>R$ 79,90</p>
                <button>Comprar</button>
            </article>

            <!-- Produto 2 -->
            <article class="product_card">
                <img src="img/produto2.jpg" alt="Jaqueta moderna">
                <h3>Jaqueta Moderna</h3>
                <p>R$ 199,90</p>
                <button>Comprar</button>
            </article>

            <!-- Produto 3 -->
            <article class="product_card">
                <img src="img/produto3.jpg" alt="Vestido elegante">
                <h3>Vestido Elegante</h3>
                <p>R$ 149,90</p>
                <button>Comprar</button>
            </article>

            <!-- Produto 4 -->
            <article class="product_card">
                <img src="img/produto4.jpg" alt="Tênis casual">
                <h3>Tênis Casual</h3>
                <p>R$ 229,90</p>
                <button>Comprar</button>
            </article>

        </section>

    </main>

    <!-- Rodapé -->
    <footer class="footer">
        <div class="footer_container">
            <img src="img/logo.png" alt="Logo Mirror Fashion" class="footer_logo">
            <p class="footer_text">&copy; Copyright Mirror Fashion</p>
        </div>
    </footer>

</body>
</html>
