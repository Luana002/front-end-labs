<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards de ofertas</title>
    <link rel="stylesheet" href="./cards.css">
</head>
<body>
    <main class="container">
        <section class="cards-wrapper">
            
            <article class="card">
                <h3>Gratuito</h3>
                <div class="preco">R$0<span>/mês</span></div>
                <ul>
                    <li>1 usuário</li>
                    <li>3 contas de design</li>
                    <li>Suporte por e-mail</li>
                </ul>
                <button type="button">Escolher plano</button>
            </article>

            <article class="card destaque">
                <h3>Elite</h3>
                <div class="preco">R$99<span>/mês</span></div>
                <ul>
                    <li>Usuários ilimitados</li>
                    <li>10 contas de design</li>
                    <li>100 implantações</li>
                    <li>Suporte 24h por dia</li>
                </ul>
                <button type="button">Escolher plano</button>
            </article>

            <article class="card">
                <h3>Profissional</h3>
                <div class="preco">R$49<span>/mês</span></div>
                <ul>
                    <li>100 usuários</li>
                    <li>3 contas de design</li>
                    <li>Suporte por e-mail</li>
                </ul>
                <button type="button">Escolher plano</button>
            </article>

        </section>
    </main>
</body>
</html>
